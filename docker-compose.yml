services:
  app:
    build: .
    image: kooroo-booking-agent:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD","wget","-qO-","http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on: []
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks: [internal]

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
