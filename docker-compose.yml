services:
  app:
    build: .
    image: kooroo-booking-agent:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
    # The DB lives on the host filesystem (bind mount). This is the
    # "simple but durable" tier: survives container rebuilds, image
    # upgrades, and `docker compose down` (unlike named volumes, it's
    # NOT removed by `docker compose down -v`). Backups go to a named
    # volume so they survive even if the host's backups dir is lost.
    volumes:
      - ./data:/app/data
      - bookingagent_backups:/app/backups
    healthcheck:
      test: ["CMD","wget","-qO-","http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on: []
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    command: ["/usr/bin/caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-build/caddy:/usr/bin/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks: [internal]

volumes:
  bookingagent_backups:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
